<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MihaniRelay</title>
    <style>
        /* ===== Variables ===== */
        :root {
            --bg: #202225;
            --sidebar: #2f3136;
            --main: #36393f;
            --text: #dcddde;
            --subtext: #8e9297;
            --primary: #5865f2;
            --danger: #ed4245;
            --success: #3ba55d;
            --border: #40444b;
            --hover: #4f545c;
            --input-bg: #40444b;
            --channel-bg: #2f3136;
            --channel-hover: #393c43;
            --channel-active: #42464d;
            --server-bg: #202225;
            --server-hover: #5865f2;
            --server-active: #5865f2;
            --scrollbar-thumb: #202225;
            --scrollbar-track: #2f3136;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --sidebar: #f2f3f5;
            --main: #ffffff;
            --text: #2e3338;
            --subtext: #747f8d;
            --primary: #c91c1c;
            --danger: #c0392b;
            --success: #27ae60;
            --border: #d7d7d7;
            --hover: #e3e5e8;
            --input-bg: #ffffff;
            --channel-bg: #f2f3f5;
            --channel-hover: #e3e5e8;
            --channel-active: #d4d7dc;
            --server-bg: #e3e5e8;
            --server-hover: #c91c1c;
            --server-active: #c91c1c;
            --scrollbar-thumb: #d7d7d7;
            --scrollbar-track: #f2f3f5;
        }

        * { box-sizing:border-box; margin:0; padding:0; }
        html, body { height:100%; font-family:'Segoe UI','Roboto',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; user-select:none; }

        #loadingOverlay {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg); display:flex; align-items:center; justify-content:center;
            z-index:9999; transition: opacity 0.3s;
        }
        #loadingOverlay.hidden { opacity:0; pointer-events:none; }
        .loader {
            width:48px; height:48px; border:5px solid var(--border);
            border-bottom-color: var(--primary); border-radius:50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        #appContainer { height:100%; display:flex; flex-direction:column; }
        .main-layout { flex:1; display:flex; overflow:hidden; }

        .servers { width:72px; background:var(--server-bg); display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:8px; flex-shrink:0; border-right:1px solid var(--border); }
        .server-icon { width:48px; height:48px; border-radius:50%; background:var(--main); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s; font-size:20px; position:relative; }
        .server-icon:hover { border-radius:16px; background:var(--server-hover); color:#fff; }
        .server-icon.active { border-radius:16px; background:var(--server-active); color:#fff; }
        .server-icon.connected { box-shadow: 0 0 15px 3px var(--success); }
        .server-icon .tooltiptext { bottom:auto; top:110%; left:50%; transform:translateX(-50%); }

        .sidebar { width:240px; background:var(--sidebar); display:flex; flex-direction:column; flex-shrink:0; border-right:1px solid var(--border); }
        .sidebar-header { padding:16px 12px; border-bottom:1px solid var(--border); font-weight:bold; font-size:16px; white-space:nowrap; }
        .channel-list { flex:1; overflow-y:auto; padding:8px; }
        .channel-item { padding:8px 12px; border-radius:4px; cursor:pointer; font-size:14px; margin-bottom:2px; transition:background 0.15s; }
        .channel-item:hover { background:var(--channel-hover); }
        .channel-item.active { background:var(--channel-active); color:#fff; }

        .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .main-header { padding:12px 16px; border-bottom:1px solid var(--border); font-weight:bold; font-size:16px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .settings-panel { flex-shrink:0; overflow-y:auto; padding:16px; }
        .log-panel {
            flex:1; background:var(--bg); border:1px solid var(--border); border-radius:4px; margin:10px; padding:10px;
            font-family:'Consolas',monospace; font-size:12px; overflow-y:auto; white-space:pre-wrap; min-height:60px;
            user-select: text; -webkit-user-select: text;
        }

        .stats-panel { width:240px; background:var(--sidebar); display:flex; flex-direction:column; flex-shrink:0; border-left:1px solid var(--border); }
        .stats-header { padding:16px 12px; border-bottom:1px solid var(--border); font-weight:bold; font-size:14px; text-transform:uppercase; letter-spacing:0.5px; }
        .stats-list { flex:1; overflow-y:auto; padding:8px; }
        .stat-item { display:flex; justify-content:space-between; padding:8px 12px; font-size:13px; }
        .stat-label { color:var(--subtext); }
        .stat-value { font-weight:600; }

        .form-row { display:flex; gap:12px; align-items:center; margin-bottom:8px; }
        .form-row label { min-width:90px; font-size:13px; color:var(--subtext); text-align:left; }
        input, select, textarea, button { background:var(--input-bg); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:8px 12px; font-family:inherit; font-size:13px; outline:none; }
        input:focus, select:focus, textarea:focus { border-color:var(--primary); }
        button { background:var(--primary); border:none; color:white; font-weight:600; cursor:pointer; transition:filter 0.15s; }
        button:hover { filter:brightness(1.1); }
        button:disabled { opacity:0.5; cursor:not-allowed; }
        button.secondary { background:var(--hover); color:var(--text); }
        button.danger { background:var(--danger); }

        .toggle-switch { display:inline-block; width:40px; height:20px; background:var(--border); border-radius:20px; position:relative; cursor:pointer; vertical-align:middle; }
        .toggle-switch input { display:none; }
        .toggle-switch .slider { position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:white; transition:0.2s; }
        .toggle-switch input:checked + .slider { transform:translateX(20px); background:var(--primary); }

        .tooltip { position:relative; }
        .tooltiptext { visibility:hidden; background:black; color:white; padding:4px 8px; border-radius:4px; position:absolute; bottom:125%; left:50%; transform:translateX(-50%); white-space:nowrap; font-size:11px; z-index:99; pointer-events:none; }
        .tooltip:hover .tooltiptext { visibility:visible; }

        .badge { width:10px; height:10px; border-radius:50%; }
        .badge.green { background:var(--success); }
        .badge.red { background:var(--danger); }
        .badge.gray { background:#747f8d; }

        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background:var(--scrollbar-thumb); border-radius:3px; }

        .account-container { max-height:300px; overflow-y:auto; border:1px solid var(--border); border-radius:4px; padding:8px; margin-bottom:8px; }

        .show-hide-btn { background:none; border:none; color:var(--subtext); cursor:pointer; font-size:14px; padding:0 4px; }
        .show-hide-btn:hover { color:var(--text); }

        #infoOverlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(3px);
            z-index: 10000; align-items: center; justify-content: center;
        }
        #infoOverlay.active { display: flex; }
        .info-box {
            background: var(--main); border: 1px solid var(--border); border-radius: 8px;
            padding: 24px; max-width: 500px; width: 90%; color: var(--text);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .info-box h3 { margin-bottom: 12px; }
        .info-box p { font-size: 13px; line-height: 1.6; }
        .info-box button { margin-top: 16px; float: right; }
    </style>
</head>

<div id="loadingOverlay"><div class="loader"></div></div>

<div id="appContainer" style="display:none;">

        <div class="servers" id="serverList">
            <div class="server-icon active" data-mode="welcome"><span>🏠</span><span class="tooltiptext">Home</span></div>

            <div class="server-icon" data-mode="worker"><span>☁️</span><span class="tooltiptext">Cloudflare Worker</span></div>
            <div class="server-icon" data-mode="exit_node"><span>🔐</span><span class="tooltiptext">Exit Node</span></div>
            <div class="server-icon" data-mode="settings" data-section="github"><span>🐙</span><span class="tooltiptext">GitHub Codespaces</span></div>
            <div class="server-icon" id="settingsBtn"><span>⚙️</span><span class="tooltiptext">Settings</span></div>

        <div class="sidebar" id="sidebar">

        <div class="main">
            <div class="main-header">

            </div>

        </div>

        <div class="stats-panel">
            <div class="stats-header" data-lang="liveStats">Live Stats</div>
            <div class="stats-list">
                <div class="stat-item"><span class="stat-label" data-lang="requests">Requests</span><span class="stat-value" id="reqCount">0</span></div>
                <div class="stat-item"><span class="stat-label" data-lang="active">Active</span><span class="stat-value" id="activeCount">0</span></div>
                <div class="stat-item"><span class="stat-label" data-lang="bytes">Bytes</span><span class="stat-value" id="byteCount">0</span></div>
            </div>
        </div>
    </div>
</div>

<div id="infoOverlay">
    <div class="info-box">
        <h3 id="infoTitle"></h3>
        <p id="infoBody"></p>
        <button onclick="closeInfo()">Close</button>
    </div>
</div>

        },
        en: {

    };

    // ========== GLOBALS ==========
    let ws,
        darkTheme = true,
        currentMode = 'welcome',
        currentSection = 'general';
    let config = {};
    let accounts = [];
    let systemProxyOn = false;
    let uiSettings = { theme: 'dark', language: 'fa', logLevel: 'INFO' };
    let isProxyRunning = false;
    let lastPing = -1;
    let runningMode = '';

    // ========== WEBSOCKET ==========
    function connectWS() {
        ws = new WebSocket('ws://127.0.0.1:' + location.port + '/ws');
        ws.onmessage = (e) => {
            const m = JSON.parse(e.data);
            if (m.type === 'status') {
                isProxyRunning = m.running;
                lastPing = m.ping;
                runningMode = m.mode || '';
                updateStatusDisplay();
            } else if (m.type === 'log') appendLog(m.text);
        };
        ws.onclose = () => setTimeout(connectWS, 2000);
    }

    function updateStatusDisplay() {
        const dot = document.getElementById('statusDot');
        dot.style.background = isProxyRunning ? 'var(--success)' : 'var(--danger)';
        document.getElementById('pingLabel').textContent = (LANG === 'fa' ? 'پینگ: ' : 'Ping: ') + (lastPing > 0 ? lastPing + ' ms' : '- ms');
        document.getElementById('startBtn').disabled = isProxyRunning;
        document.getElementById('stopBtn').disabled = !isProxyRunning;

        document.querySelectorAll('.server-icon').forEach(i => i.classList.remove('connected'));
        if (isProxyRunning && runningMode) {
            const activeIcon = document.querySelector(`.server-icon[data-mode="${runningMode}"]`);
            if (activeIcon) activeIcon.classList.add('connected');
        }
    }

    function appendLog(text) {
        const log = document.getElementById('logArea');
        log.textContent += text;
        if (log.textContent.length > 500000) {
            log.textContent = log.textContent.slice(log.textContent.length - 400000);
        }
        log.scrollTop = log.scrollHeight;
    }

    function clearLog() { document.getElementById('logArea').textContent = ''; }

    // ========== LOADING SEQUENCE ==========
    window.addEventListener('load', async () => {
        await loadUISettings();
        applyLanguage();
        await Promise.all([loadConfig(), waitForWS()]);
        document.getElementById('loadingOverlay').classList.add('hidden');
        document.getElementById('appContainer').style.display = 'flex';
        if (config.Mode && config.Mode !== 'welcome' && getModeSections(config.Mode)) {
            currentMode = config.Mode;
            const activeIcon = document.querySelector(`.server-icon[data-mode="${config.Mode}"]`);
            if (activeIcon) {
                document.querySelectorAll('.server-icon').forEach(i => i.classList.remove('active'));
                activeIcon.classList.add('active');
            }
        }
        rebuildChannelList();
    });

    function waitForWS() {
        return new Promise(resolve => {
            connectWS();
            const check = setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) { clearInterval(check); resolve(); }
            }, 100);
            setTimeout(() => { clearInterval(check); resolve(); }, 5000);
        });
    }

    document.getElementById('serverList').addEventListener('click', async (e) => {
        const icon = e.target.closest('.server-icon');
        if (!icon) return;

        const mode = icon.dataset.mode;
        if (icon.id === 'settingsBtn') {
            currentMode = 'settings';
            document.querySelectorAll('.server-icon').forEach(i => i.classList.remove('active'));
            icon.classList.add('active');
            rebuildChannelList();
            updateStatusDisplay();
            return;
        }

        if (mode) {
            if (mode !== currentMode) clearLog();
            currentMode = mode;
            document.querySelectorAll('.server-icon').forEach(i => i.classList.remove('active'));
            icon.classList.add('active');
            config.Mode = mode;

            // اگر روی آیکون GitHub کلیک کرد، مستقیم به بخش GitHub در Settings برو
            if (icon.dataset.section) {
                currentSection = icon.dataset.section;
            } else {
                currentSection = 'general'; // یا اولین بخش
            }

            try {
                if (mode !== 'welcome') {
                    await loadConfig();
                } else {
                    config = {};
                }
            } catch (err) {
                console.error('loadConfig failed', err);
            } finally {
                rebuildChannelList();
                updateStatusDisplay();
            }
        }
    });

    function rebuildChannelList() {
        const modeObj = getModeSections(currentMode);
        if (!modeObj) return;
        document.getElementById('sidebarHeader').textContent = modeObj.name;
        const list = document.getElementById('channelList');
        list.innerHTML = '';
        const sections = modeObj.sections;
        if (!sections[currentSection] || (currentMode !== 'welcome' && currentSection === 'welcome')) {
            currentSection = Object.keys(sections)[0];
        }
        Object.entries(sections).forEach(([key, section]) => {
            const div = document.createElement('div');
            div.className = 'channel-item' + (currentSection === key ? ' active' : '');
            div.textContent = section.name;
            div.onclick = () => {
                currentSection = key;
                document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                renderContent();
            };
            list.appendChild(div);
        });
        renderContent();
    }

    function renderContent() {
        const modeObj = getModeSections(currentMode);
        const section = modeObj.sections[currentSection];
        if (!section) return;
        document.getElementById('mainTitle').textContent = section.name;
        const panel = document.getElementById('settingsPanel');
        panel.innerHTML = '';
        section.render(panel);
        if (currentMode !== 'welcome') {
            const infoBtn = document.createElement('button');
            infoBtn.className = 'secondary';
            infoBtn.textContent = 'ℹ️ ' + (LANG === 'fa' ? 'توضیحات' : 'Info');
            infoBtn.style.marginTop = '12px';
            infoBtn.onclick = function () { showInfo(currentSection); };
            panel.appendChild(infoBtn);
        }
    }

        if (!section) return;
        const overlay = document.getElementById('infoOverlay');
        document.getElementById('infoTitle').textContent = section.name;
        document.getElementById('infoBody').textContent = section.info || '';
        overlay.classList.add('active');

    // ========== GITHUB RENDERER ==========
    async function renderGitHubSection(container) {
        container.innerHTML = "";
        const t = texts[LANG];

        // دریافت وضعیت فعلی از سرور
        let state = { authenticated: false, username: '', forked: false, status: 'idle', codespace: {} };
        try {
            const r = await fetch('/api/github/status');
            state = await r.json();
        } catch(e) {}

        // ورود/خروج
        const authDiv = document.createElement("div");
        authDiv.className = "form-row";
        if (state.authenticated) {
            authDiv.innerHTML = `<label>${t.githubLogin}</label><div>${state.username} (✔)</div>`;
            const logoutBtn = document.createElement("button");
            logoutBtn.textContent = t.githubLogout;
            logoutBtn.onclick = async () => { 
                await fetch('/api/github/logout'); 
                renderGitHubSection(container); 
            };
            authDiv.appendChild(logoutBtn);
        } else {
            const loginBtn = document.createElement("button");
            loginBtn.textContent = t.githubLogin;
            loginBtn.onclick = async () => {
                window.open('/api/github/login', '_blank');
                // بعد از چند لحظه رفرش کن (راه بهتر: polling)
                setTimeout(() => renderGitHubSection(container), 5000);
            };
            authDiv.appendChild(loginBtn);
        }
        container.appendChild(authDiv);

        if (!state.authenticated) return;

        // فورک
        const forkDiv = document.createElement("div");
        forkDiv.className = "form-row";
        const forkBtn = document.createElement("button");
        forkBtn.textContent = t.githubFork;
        forkBtn.disabled = state.forked;
        forkBtn.onclick = async () => {
            appendLog("[GitHub] Forking repository...\n");
            await fetch('/api/github/fork', { method: 'POST' });
            renderGitHubSection(container);
        };
        forkDiv.appendChild(forkBtn);
        container.appendChild(forkDiv);

        // ساخت Codespace
        const createDiv = document.createElement("div");
        createDiv.className = "form-row";
        const createBtn = document.createElement("button");
        createBtn.textContent = t.githubCreate;
        createBtn.disabled = !state.forked || state.status === 'creating' || state.status === 'ready';
        createBtn.onclick = async () => {
            appendLog("[GitHub] Creating Codespace...\n");
            await fetch('/api/github/create', { method: 'POST' });
            renderGitHubSection(container);
            pollGitHubStatus();
        };
        createDiv.appendChild(createBtn);
        container.appendChild(createDiv);

        // توقف/حذف
        if (state.codespace && state.codespace.status === 'ready') {
            const stopDiv = document.createElement("div");
            stopDiv.className = "form-row";
            const stopBtn = document.createElement("button");
            stopBtn.textContent = t.githubStop;
            stopBtn.onclick = async () => { 
                await fetch('/api/github/stop', { method: 'POST' }); 
                renderGitHubSection(container); 
            };
            stopDiv.appendChild(stopBtn);
            const delBtn = document.createElement("button");
            delBtn.textContent = t.githubDelete;
            delBtn.onclick = async () => { 
                await fetch('/api/github/delete', { method: 'POST' }); 
                renderGitHubSection(container); 
            };
            stopDiv.appendChild(delBtn);
            container.appendChild(stopDiv);
        }

        // نمایش VLESS
        if (state.codespace && state.codespace.vless) {
            const vlessDiv = document.createElement("div");
            vlessDiv.innerHTML = `<label>${t.githubVless}:</label><code>${state.codespace.vless}</code>`;
            container.appendChild(vlessDiv);
        }

        // شروع/توقف Xray (اتصال)
        const xrayDiv = document.createElement("div");
        xrayDiv.className = "form-row";
        const startXrayBtn = document.createElement("button");
        startXrayBtn.textContent = t.githubXrayStart;
        startXrayBtn.onclick = async () => {
            appendLog("[Xray] Starting...\n");
            await fetch('/api/xray/start', { method: 'POST' });
            config.Mode = 'github';
            await fetch('/api/config/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(config) });
            await fetch('/api/start');
            updateStatusDisplay();
        };
        xrayDiv.appendChild(startXrayBtn);
        const stopXrayBtn = document.createElement("button");
        stopXrayBtn.textContent = t.githubXrayStop;
        stopXrayBtn.onclick = async () => {
            await fetch('/api/xray/stop', { method: 'POST' });
            if (proxyRunning) await fetch('/api/stop');
            updateStatusDisplay();
        };
        xrayDiv.appendChild(stopXrayBtn);
        container.appendChild(xrayDiv);

        // خطا
        if (state.lastError) {
            const errDiv = document.createElement("div");
            errDiv.style.color = 'var(--danger)';
            errDiv.textContent = 'Error: ' + state.lastError;
            container.appendChild(errDiv);
        }
    }

    async function pollGitHubStatus() {
        const box = document.getElementById("ghStatusBox");
        if (!box) return;
        for (let i = 0; i < 60; i++) {
            await new Promise(r => setTimeout(r, 3000));
            // آپدیت وضعیت با فراخوانی مجدد renderGitHubSection (که خودش وضعیت را می‌گیرد)
            // ولی برای جلوگیری از لوپ، از یک تابع جداگانه استفاده می‌کنیم
            try {
                const r = await fetch('/api/github/status');
                const s = await r.json();
                box.dataset.status = s.status || "idle";
                // نمایش VLESS و غیره
                renderGitHubStatus(box);
                if (s.status === 'ready' || s.status === 'error') break;
            } catch(e) {}
        }
    }

    async function renderGitHubStatus(box) {
        try {
            const r = await fetch('/api/github/status');
            const s = await r.json();
            box.dataset.status = s.status || "idle";
            const t = texts[LANG];
            let html = "<div class='form-row'><label>" + t.githubStatus + ":</label><div>" + (s.status || "idle") + "</div></div>";
            if (s.codespace && s.codespace.name) {
                html += "<div class='form-row'><label>Codespace:</label><div>" + s.codespace.name + "</div></div>";
            }
            if (s.codespace && s.codespace.vless) {
                html += "<div class='form-row'><label>" + t.githubVless + ":</label><div style='word-break:break-all'><code>" + s.codespace.vless + "</code></div></div>";
            }
            if (s.codespace && s.codespace.webUrl) {
                html += "<div class='form-row'><label></label><div><button class='secondary' onclick='window.open(\"" + s.codespace.webUrl + "\",\"_blank\")'>" + t.githubOpen + "</button></div></div>";
            }
            if (s.lastError) {
                html += "<div class='form-row'><label>Error:</label><div style='color: var(--danger)'>" + s.lastError + "</div></div>";
            }
            box.innerHTML = html;
        } catch(e) {
            box.innerHTML = "<p style='color:var(--danger)'>Failed to load status.</p>";
        }
    }

    // ========== ACTIONS ==========
    async function startProxy() { await saveCurrentConfig(); await fetch('/api/start'); }
    async function stopProxy() { await fetch('/api/stop'); }

    async function scanIPs() {
        appendLog('🔍 Scanning IPs...\n');
        const r = await fetch('/api/scan');
        const results = await r.json();
        let best = null;
        results.forEach(x => {
            appendLog(`  ${x.ip} → ${x.ping} ms${x.error ? ' ERR' : ''}\n`);
            if (!x.error && parseFloat(x.ping) > 0 && (!best || parseFloat(x.ping) < parseFloat(best.ping))) best = x;
        });
        if (best) {
            document.getElementById('generalGoogleIP').value = best.ip;
            appendLog(`✅ Best IP: ${best.ip} (${best.ping} ms)\n`);
        }
    }

    async function checkAccountHealth() {
        const ids = [];
        accounts.forEach(acc => {
            (acc.ScriptIDs || []).forEach(id => { if (id && id.trim()) ids.push({id: id.trim(), key: acc.AuthKey}); });
        });
        if (!ids.length) { appendLog('No IDs to check.\n'); return; }
        appendLog('🔍 Health check...\n');
        let html = '';
        for (const item of ids) {
            try {
                const r = await fetch(`/api/health?id=${encodeURIComponent(item.id)}&key=${encodeURIComponent(item.key || config.AuthKey)}`);
                const d = await r.json();
                if (d.ok) {
                    html += `<span style="color:var(--success);">🟢</span> ${item.id.slice(0,12)}... : ${texts[LANG].healthSuccess} | ${texts[LANG].responseTime}: ${d.ping_ms} ms | ${texts[LANG].statusCode}: ${d.status} | ${texts[LANG].targetIP}: ${d.target_ip||'?'}<br>`;
                    appendLog('✅ ' + item.id.slice(0,12) + '... OK ('+d.ping_ms+' ms, IP '+d.target_ip+')\n');
                } else {
                    html += `<span style="color:var(--danger);">🔴</span> ${item.id.slice(0,12)}... : ${texts[LANG].healthFail} – ${d.error||'Unknown error'}<br>`;
                    appendLog('❌ ' + item.id.slice(0,12) + '... FAIL: '+(d.error||'') + '\n');
                }
            } catch(e) {
                html += `<span style="color:var(--danger);">🔴</span> ${item.id.slice(0,12)}... : Network error<br>`;
                appendLog('🔴 Network error for ' + item.id.slice(0,12) + '\n');
            }
        }
        document.getElementById('healthResult').innerHTML = html;
        setTimeout(() => { document.getElementById('healthResult').innerHTML = ''; }, 4000);
    }

    async function copyCode(type) {
        const url = type==='worker' ? '/api/code/worker' : '/api/code/script';
        const resp = await fetch(url);
        const text = await resp.text();
        await navigator.clipboard.writeText(text);
        appendLog('✅ Copied to clipboard\n');
    }

    async function toggleSystemProxy(enable) {
        systemProxyOn = enable;
        const url = '/api/set-proxy?enable=' + enable;
        const r = await fetch(url);
        const d = await r.json();
        appendLog((enable ? '✅ Proxy set: ' : '✅ Proxy removed: ') + d.status + '\n');
    }

    function toggleTheme() {
        darkTheme = !darkTheme;
        document.body.setAttribute('data-theme', darkTheme ? 'dark' : 'light');
        saveUISettings();
        renderContent();
    }

    function changeLanguage(lang) {
        localStorage.setItem('lang', lang);
        LANG = lang;
        saveUISettings();
        location.reload();
    }

    function updateLogLevel(level) {
        uiSettings.logLevel = level;
        saveUISettings();
    }

    // ========== CONFIG HELPERS ==========
    async function loadConfig() {
        const mode = currentMode === 'settings' ? 'apps_script' : currentMode;
        const r = await fetch('/api/config/load?mode=' + mode);
        if (!r.ok) throw new Error('Failed to load config');
        config = await r.json();
        config = Object.assign({
            GoogleIP:'216.239.38.120', FrontDomain:'www.google.com', ListenHost:'127.0.0.1',
            ListenPort:8085, Socks5Port:1080, LogLevel:'INFO', AuthKey:'', ScriptID:'',
            Mode:'apps_script', VerifySSL:true, AntiBan:false, ForceRelayYouTube:false,
            LanSharing:false, PerformanceMode:false, HealthInterval:5, CustomDirectHosts:[],
            FrontingGroups:[], ExitNode:{Enabled:false,RelayURL:'',PSK:'',Hosts:[],Mode:'selective'},
            Accounts:[], WorkerURL:'', WorkerEnabled:false, UpstreamForwarderURL:'', UpstreamAuthKey:'',
            GitHub:{Enabled:false,Token:'',RepoOwner:'amiremohamadi',RepoName:'g2ray',Branch:'main',Machine:'standardLinux2x4'},
            Xray:{Port:10808, BinPath:''}
        }, config);
        if (config.Accounts && config.Accounts.length > 0) {
            accounts = JSON.parse(JSON.stringify(config.Accounts));
        } else {
            accounts = [{AuthKey: config.AuthKey||'', ScriptIDs: config.ScriptIDs||['']}];
        }
    }

    function syncConfigFromDOM() {
        if (document.getElementById('generalGoogleIP')) config.GoogleIP = document.getElementById('generalGoogleIP').value;
        if (document.getElementById('generalFrontDomain')) config.FrontDomain = document.getElementById('generalFrontDomain').value;
        if (document.getElementById('generalListenHost')) config.ListenHost = document.getElementById('generalListenHost').value;
        if (document.getElementById('generalPort')) config.ListenPort = parseInt(document.getElementById('generalPort').value) || 8085;
        if (document.getElementById('advAntiBan')) config.AntiBan = document.getElementById('advAntiBan').checked;
        if (document.getElementById('advForceRelayYouTube')) config.ForceRelayYouTube = document.getElementById('advForceRelayYouTube').checked;
        if (document.getElementById('advLAN')) config.LanSharing = document.getElementById('advLAN').checked;
        if (document.getElementById('advPerf')) config.PerformanceMode = document.getElementById('advPerf').checked;
        if (document.getElementById('advDirectHosts')) config.CustomDirectHosts = document.getElementById('advDirectHosts').value.split('\n').filter(Boolean);

        const multiCheck = document.getElementById('multiAccountCheck')?.checked;
        if (multiCheck) {
            config.Accounts = accounts.filter(acc => acc.AuthKey || (acc.ScriptIDs || []).some(id => id.trim()));
            if (config.Accounts.length === 0) config.Accounts = undefined;
        } else {
            config.Accounts = undefined;
            if (accounts.length > 0) {
                config.AuthKey = accounts[0].AuthKey;
                config.ScriptIDs = accounts[0].ScriptIDs.filter(id => id.trim());
                config.ScriptID = config.ScriptIDs.length > 0 ? config.ScriptIDs[0] : '';
            }
        }

        if (document.getElementById('workerEnabled')) config.WorkerEnabled = document.getElementById('workerEnabled').checked;
        if (document.getElementById('workerURL')) config.WorkerURL = document.getElementById('workerURL').value;
        if (document.getElementById('upstreamURL')) config.UpstreamForwarderURL = document.getElementById('upstreamURL').value;
        if (document.getElementById('upstreamAuth')) config.UpstreamAuthKey = document.getElementById('upstreamAuth').value;

        const en = {
            Enabled: document.getElementById('exitEnabled')?.checked || false,
            RelayURL: document.getElementById('exitURL')?.value || '',
            PSK: document.getElementById('exitPSK')?.value || '',
            Hosts: (document.getElementById('exitHosts')?.value || '').split('\n').filter(Boolean),
            Mode: 'selective'
        };
        if (en.Enabled || en.RelayURL) config.ExitNode = en;

        try { if (document.getElementById('fgJSON')) config.FrontingGroups = JSON.parse(document.getElementById('fgJSON').value || '[]'); } catch (e) {}
    }

    async function saveCurrentConfig() {
        syncConfigFromDOM();
        config.Mode = currentMode === 'settings' ? 'apps_script' : currentMode;
        await fetch('/api/config/save', { method:'POST', headers: {'Content-Type':'application/json'}, body:JSON.stringify(config) });
        appendLog('✅ Configuration saved.\n');
    }

    // Stats polling
    setInterval(async () => {
        try {
            const r = await fetch('/api/stats');
            const s = await r.json();
            document.getElementById('reqCount').textContent = s.requests || 0;
            document.getElementById('activeCount').textContent = s.active || 0;
            document.getElementById('byteCount').textContent = formatBytes(s.bytes || 0);
        } catch (e) {}
    }, 2000);

    function formatBytes(b) {
        if (b < 1024) return b + ' B';
        if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
        return (b / 1048576).toFixed(1) + ' MB';
    }
</script>
